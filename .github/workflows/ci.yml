name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx vitest run

      # VITE_SUPABASE_URL/ANON_KEY precisam existir como Repository Secrets
      # (Settings → Secrets and variables → Actions) — são públicas por design
      # (embutidas no bundle do cliente, protegidas por RLS), mas o build do Vite
      # precisa delas presentes em tempo de build pra não gerar um bundle quebrado
      # (ver incidente do .env.local: supabaseUrl is required).
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
